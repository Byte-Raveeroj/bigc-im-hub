  <style>
:root{--bg:#F8FBFF;--bg-2:#EEF5E8;--surface:#FFFFFF;--surface-2:#F9FDF5;--ink:#18201A;--ink-2:#3D4840;--muted:#7A8A7D;--border:#DDE8D8;--border-strong:#C4D9BC;--primary:#5BA900;--primary-2:#93D600;--primary-soft:#EBF7D4;--accent:#DB000E;--accent-soft:#FFEAEB;--green:#3C8C1E;--green-soft:#D5F0C0;--red:#C7493A;--red-soft:#F8E0DA;--amber:#D78A1E;--amber-soft:#FBEDD2;--shadow-sm:0 1px 3px rgba(24,32,26,.07),0 1px 2px rgba(24,32,26,.04);--shadow-md:0 8px 24px -8px rgba(24,32,26,.13),0 2px 6px rgba(24,32,26,.06);--shadow-lg:0 24px 60px -20px rgba(24,32,26,.16),0 4px 12px rgba(24,32,26,.07);--radius-sm:8px;--radius:14px;--radius-lg:22px;--radius-xl:32px;--sidebar-w:280px;--font-display:"Bricolage Grotesque","IBM Plex Sans Thai",system-ui,sans-serif;--font-body:"Plus Jakarta Sans","IBM Plex Sans Thai",system-ui,sans-serif;--font-mono:"JetBrains Mono",ui-monospace,Menlo,monospace;--font-thai:"IBM Plex Sans Thai","Plus Jakarta Sans",system-ui,sans-serif}

.steps{display:flex;flex-direction:column;gap:18px;margin:18px 0}.step{display:grid;grid-template-columns:44px 1fr;gap:16px;align-items:flex-start}.step-num{width:44px;height:44px;border-radius:12px;background:var(--primary);color:#fff;display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:18px}.step-num.accent{background:var(--accent)}.step-body{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;min-width:0}.step-body h4{margin-top:0}
.faq-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}.faq-q{width:100%;text-align:left;background:transparent;border:none;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:14px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink)}.faq-q .chev{width:22px;height:22px;border-radius:50%;background:var(--bg-2);display:grid;place-items:center;font-size:11px;flex-shrink:0;transition:transform .2s ease;color:var(--ink-2)}.faq-item.open .chev{transform:rotate(180deg);background:var(--primary);color:#fff}.faq-a{padding:0 20px 16px;font-size:14px;color:var(--ink-2);line-height:1.6}
.hero{padding-top:24px;padding-bottom:30px}.hero-meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:26px;padding:18px 22px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}.hero-meta-item .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin-bottom:4px}.hero-meta-item .value{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ink)}.hero-meta-divider{width:1px;background:var(--border);align-self:stretch}
.feature-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:22px 0}@media(max-width:800px){.feature-strip{grid-template-columns:1fr}}.feature{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;position:relative;overflow:hidden}.feature .icon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;margin-bottom:14px;font-size:22px}.feature .icon.blue{background:var(--primary-soft)}.feature .icon.coral{background:var(--accent-soft)}.feature .icon.green{background:var(--green-soft)}.feature h3{margin:0 0 8px;font-size:19px}.feature p{margin:0;font-size:14px;color:var(--ink-2)}.feature .th{font-family:var(--font-thai);font-size:13px;color:var(--muted);margin-top:6px}

.data-table{width:100%;border-collapse:collapse;font-size:14px}.data-table th{text-align:left;padding:10px 14px;background:var(--bg-2);border-bottom:2px solid var(--border-strong);font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--ink);white-space:nowrap}.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--ink-2);vertical-align:top}.data-table tr:last-child td{border-bottom:none}.data-table tr:hover td{background:var(--surface-2)}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;font-family:var(--font-mono)}.pill.green{background:var(--green-soft);color:var(--green)}.pill.red{background:var(--red-soft);color:var(--red)}.pill.amber{background:var(--amber-soft);color:var(--amber)}.pill.blue{background:var(--primary-soft);color:var(--primary)}.pill.gray{background:var(--bg-2);color:var(--muted)}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}@media(max-width:800px){.stat-row{grid-template-columns:repeat(2,1fr)}}.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;text-align:center}.stat-card .num{font-family:var(--font-display);font-weight:800;font-size:32px;line-height:1;margin-bottom:4px}.stat-card .lbl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}.stat-card .sub-lbl{font-family:var(--font-thai);font-size:12px;color:var(--muted);margin-top:2px}

.flow-box{display:flex;flex-direction:column;align-items:center;gap:6px}.flow-node{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 16px;font-size:13px;font-weight:600;text-align:center;position:relative;min-width:140px}.flow-node.primary{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}.flow-node.accent{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}.flow-node.green{background:var(--green-soft);border-color:var(--green);color:var(--green)}.flow-node.gold{background:#FFFBEB;border-color:#D97706;color:#92400E}.flow-arrow{color:var(--muted);font-size:18px;line-height:1}.flow-parallel{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;justify-content:center}.flow-lane{background:var(--surface-2);border:1px dashed var(--border-strong);border-radius:var(--radius);padding:12px 14px;font-size:12px;text-align:center;min-width:110px}.flow-sla{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:4px}

.feed{display:flex;flex-direction:column;gap:12px;margin-top:18px}.feed-empty{text-align:center;padding:48px 24px;background:var(--surface-2);border-radius:var(--radius-lg);border:2px dashed var(--border-strong);color:var(--muted)}.feed-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative}.feed-entry:hover{box-shadow:var(--shadow-sm)}.feed-entry .entry-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}.feed-entry .entry-title{font-weight:700;font-size:15px;color:var(--ink)}.feed-entry .entry-body{font-size:14px;color:var(--ink-2);line-height:1.55}.feed-entry .entry-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}.feed-entry .entry-meta .meta-item{font-family:var(--font-mono);font-size:11px;color:var(--muted)}.entry-delete{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px;line-height:1}.entry-delete:hover{color:var(--red);background:var(--red-soft)}

.export-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px 18px;background:var(--surface-2);border-radius:var(--radius);border:1px solid var(--border);margin-top:18px}.export-bar .export-btn{padding:8px 16px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .15s ease}.export-btn.dl{background:var(--green);border-color:var(--green);color:#fff}.export-btn.dl:hover{background:#2e7a57}.export-btn.imp{background:var(--surface);border-color:var(--border);color:var(--ink-2)}.export-btn.imp:hover{background:var(--bg-2)}.export-btn.clr{background:var(--surface);border-color:var(--red-soft);color:var(--red)}.export-btn.clr:hover{background:var(--red-soft)}

.cov-row{display:flex;flex-direction:column;gap:10px;margin:14px 0}.cov-item{display:grid;grid-template-columns:180px 1fr 60px;gap:12px;align-items:center;font-size:13px}.cov-label{font-weight:600;color:var(--ink-2)}.cov-bar-wrap{background:var(--bg-2);border-radius:999px;height:10px;overflow:hidden}.cov-bar-fill{height:100%;border-radius:999px;transition:width .6s ease}.cov-val{font-family:var(--font-mono);font-size:12px;color:var(--muted);text-align:right}

@media(max-width:1000px){.app{grid-template-columns:1fr}.sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;max-height:75vh;z-index:50;border-top:1px solid var(--border);border-right:none;transform:translateY(calc(100% - 68px));transition:transform .25s ease;overflow-y:auto;box-shadow:0 -10px 28px rgba(31,27,22,.10)}.sidebar.open{transform:translateY(0)}.sidebar-brand{cursor:pointer;position:sticky;top:0;background:var(--surface);z-index:2;border-bottom:1px solid var(--border);padding-right:44px}.sidebar-brand .drawer-handle{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px;transition:transform .25s ease;line-height:1}.sidebar.open .sidebar-brand .drawer-handle{transform:translateY(-50%) rotate(180deg)}.main{padding:28px 22px 96px}}

@media(max-width:700px){html,body{max-width:100vw;overflow-x:hidden}body{font-size:15px}.main{padding:22px 16px 96px}h1{font-size:clamp(28px,8vw,38px)!important}h2{font-size:clamp(22px,6vw,30px)!important}.lead{font-size:16px!important}.cov-item{grid-template-columns:120px 1fr 50px}}
/* ── Wiki Setup styles ── */

@media(max-width:800px){.compare{grid-template-columns:1fr}}

.compare-card.phase05::before{background:var(--primary)}
.compare-card.phase1::before{background:var(--amber)}
.compare-card .phase-tag{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:5px;display:inline-block;margin-bottom:10px}
.phase-tag.p0{background:var(--bg-2);color:var(--muted)}
.phase-tag.p05{background:var(--primary-soft);color:var(--green)}
.phase-tag.p1{background:var(--amber-soft);color:var(--amber)}
.compare-card h3{margin:0 0 8px;font-size:17px}
.compare-card .tagline{font-size:13px;color:var(--muted);margin-bottom:14px;font-family:var(--font-thai)}
.pros-cons{margin-top:10px}

.pros-cons .mark{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;font-family:var(--font-mono);margin-top:2px}
.pros-cons .pro .mark{background:var(--green-soft);color:var(--green)}
.pros-cons .con .mark{background:var(--red-soft);color:var(--red)}
.ig-wrap{background:linear-gradient(180deg,#FFFFFF 0%,var(--surface-2) 100%);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px 32px 24px;margin:20px 0;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}

const { useState, useEffect, useRef, useMemo } = React;

function Section({ id, eyebrow, eyebrowKind="", title, subtitle, thai, children }) {

      {thai && <div className="thai-lead">{thai}</div>}
      {children}
    </section>
  );
}
function Callout({ kind="info", icon, children }) {
  const ic = icon||(kind==="warn"?"⚠":kind==="tip"?"★":kind==="danger"?"✕":"i");
  return (
    <div className={`callout ${kind==="info"?"":kind}`}>
      <div className="callout-icon">{ic}</div>
      <div className="callout-body">{children}</div>
    </div>
  );
}
function CodeBlock({ label="shell", children }) {
  const [copied, setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(typeof children==="string"?children:""); setCopied(true); setTimeout(()=>setCopied(false),1400); };
  return (
    <div className="code-wrap">
      <div className="code-header"><span className="label"><span className="dot"></span>{label}</span><button className={`code-copy ${copied?"copied":""}`} onClick={copy}>{copied?"Copied ✓":"Copy"}</button></div>
      <pre className="code">{children}</pre>
    </div>
  );
}
function FAQItem({ q, qTh, children }) {
  const [open, setOpen] = useState(false);

}

              </span>

      </div>
    </aside>
  );
};
const App = ({ children }) => {
  const [active, setActive] = useState(NAV[0]?.id||"");
  const [open, setOpen] = useState(false);
  const jump = (id) => {
    const el = document.getElementById(id);
    if(el){ window.scrollTo({ top: el.getBoundingClientRect().top+window.scrollY-16, behavior:"smooth" }); }
    setActive(id);
  };
  useEffect(()=>{
    if(!NAV.length) return;
    let raf=0;
    const compute = () => {
      const y=window.scrollY,vh=window.innerHeight,docMax=document.documentElement.scrollHeight-vh;
      if(y<80){setActive(NAV[0].id);return;}
      if(docMax-y<80){setActive(NAV[NAV.length-1].id);return;}
      const line=vh*0.3; let best=NAV[0].id;
      for(const n of NAV){ const el=document.getElementById(n.id); if(!el) continue; if(el.getBoundingClientRect().top<=line) best=n.id; else break; }
      setActive(best);
    };
    const onScroll=()=>{ if(raf) return; raf=requestAnimationFrame(()=>{ raf=0; compute(); }); };
    window.addEventListener("scroll",onScroll,{passive:true});
    window.addEventListener("resize",onScroll);
    compute();
    return()=>{ window.removeEventListener("scroll",onScroll); window.removeEventListener("resize",onScroll); if(raf) cancelAnimationFrame(raf); };
  },[]);
  return (
    <div className="app">
      <Sidebar active={active} onJump={jump} open={open} onToggle={setOpen}/>
      <main className="main">{children}</main>
    </div>
  );
};
function Infographic({ title, thai, caption, captionTh, children, height=240 }) {

          {captionTh&&<div className="th">{captionTh}</div>}
        </div>
      )}
    </div>
  );
}

const STORAGE_KEY = "bigc_im_knowledge_updates";
const CATEGORIES = ["Bug Found","Dev Answer","Decision","New Requirement","Question","Note","Blocker","TC Update","Other"];
const PRIORITIES = ["🔴 High","🟡 Medium","🟢 Low"];
const SECTION_REFS = [
  "—  (General)",
  "01 · Project Scope",
  "02 · Approval Flow",
  "03 · Routing Rules",
  "04 · Roles & Access",
  "05 · Glossary",
  "06 · TC Dashboard",
  "07 · Automation",
  "08 · Key Files",
  "09 · Open Questions",
  "10 · Team Updates",
];

// Shared entries baked into HTML by Claude on each sync (visible to ALL visitors)
const SHARED   = window.SHARED_UPDATES || [];
const SYNCMETA = window.SYNC_META      || { syncedAt:null, lastSyncedBy:"—", totalEntries:0, nextScheduled:"ทุกชั่วโมง 10:00–20:00 น." };

const SectionUpdates = () => {
  const [localEntries, setLocalEntries] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); } catch(e) { return []; }
  });
  const [form, setForm]         = useState({ category:"Note", author:"", priority:"🟡 Medium", title:"", description:"", linkedTC:"", sectionRef:"—  (General)" });
  const [filterCat, setFilterCat] = useState("All");
  const [saved, setSaved]       = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [submitStatus, setSubmitStatus] = useState(null); // null | "ok" | "err"
  const fileRef = useRef(null);

  const persistLocal = (list) => { setLocalEntries(list); localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); };
  const update = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = () => {
    if(!form.title.trim()||!form.author.trim()) return;
    const entry = { ...form, id:Date.now(), ts:new Date().toISOString(), synced:false };
    persistLocal([entry, ...localEntries]);
    setForm(f=>({...f, title:"", description:"", linkedTC:"", sectionRef:"—  (General)"}));
    setSaved(true); setTimeout(()=>setSaved(false),2200);
  };

  const delLocal = (id) => { if(confirm("ลบ draft นี้?")) persistLocal(localEntries.filter(e=>e.id!==id)); };

  const exportJSON = () => {
    const data = { exportedAt:new Date().toISOString(), project:"BigC Supplier Portal IM", entries:localEntries };
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=`bigc-im-updates-${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importJSON = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data     = JSON.parse(ev.target.result);
        const imported = data.entries||data;
        if(!Array.isArray(imported)) { alert("Invalid file format"); return; }
        const merged = [...imported, ...localEntries].filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i);
        persistLocal(merged.sort((a,b)=>new Date(b.ts)-new Date(a.ts)));
        alert(`Imported ${imported.length} entries ✅`);
      } catch { alert("Invalid JSON file"); }
    };
    reader.readAsText(file);
  };

  const clearLocal = () => {
    if(confirm("ลบ drafts ทั้งหมดใน browser นี้?\n(entries ที่ sync แล้วจะยังคงอยู่ใน Hub)"))
      persistLocal([]);
  };

  const submitToHub = async () => {
    if(localEntries.length === 0) return;
    setSubmitting(true); setSubmitStatus(null);
    try {
      const res = await fetch("/api/submit-update", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          exportedAt: new Date().toISOString(),
          project: "BigC Supplier Portal IM",
          entries: localEntries
        })
      });
      if(!res.ok) throw new Error((await res.json()).error || res.statusText);
      setSubmitStatus("ok");
      // mark all local entries as synced
      persistLocal(localEntries.map(e=>({...e, synced:true})));
      setTimeout(()=>setSubmitStatus(null), 5000);
    } catch(err) {
      console.error("submitToHub error:", err);
      setSubmitStatus("err");
      setTimeout(()=>setSubmitStatus(null), 6000);
    } finally {
      setSubmitting(false);
    }
  };

  const catColor = c => ({"Bug Found":"red","Dev Answer":"green","Decision":"blue","Blocker":"red","New Requirement":"blue","Question":"amber","TC Update":"green"})[c]||"gray";

  const fmtDate = ts => {
    try {
      const d = new Date(ts);
      return d.toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"numeric"})+" "+
             d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
    } catch { return ts||"—"; }
  };

  const filteredShared = SHARED.filter(e=>filterCat==="All"||e.category===filterCat);

  return (
    <Section id="updates" eyebrow="10 · Team Updates" eyebrowKind="accent"
      title="Team Updates Feed"
      subtitle={<>ข้อมูลที่ sync แล้วจะ <strong>ปรากฏให้ทุกคนเห็น</strong> — Co-Work sync อัตโนมัติ <strong>ทุกชั่วโมง</strong> ช่วง 10:00–20:00 น.</>}
      thai={<>กรอกข้อมูลอัพเดทหรือแก้ไขข้อมูลที่ถูกต้อง แล้วกด "ส่ง Update ให้ทีม" — ข้อมูลจะปรากฏให้ทุกคนเห็นภายใน 1 ชั่วโมง <em style={{opacity:.45,fontSize:"0.88em"}}>* sync ทุกชั่วโมง 10:00–20:00 น.</em></>}>

      {/* ── Sync Status Banner ── */}
      <div style={{
        display:"flex", alignItems:"center", gap:14,
        padding:"14px 20px",
        background: SYNCMETA.syncedAt ? "var(--green-soft)" : "var(--amber-soft)",
        border:"1.5px solid", borderColor: SYNCMETA.syncedAt ? "var(--green)" : "var(--amber)",
        borderRadius:"var(--radius)", marginBottom:24
      }}>
        <span style={{ fontSize:26, lineHeight:1 }}>{SYNCMETA.syncedAt ? "✅" : "⏰"}</span>
        <div style={{ flex:1 }}>
          <div style={{ fontFamily:"var(--font-display)", fontWeight:700, fontSize:15, color:"var(--ink)" }}>
            {SYNCMETA.syncedAt
              ? `Last synced: ${fmtDate(SYNCMETA.syncedAt)}`
              : "ยังไม่มีการ sync — รอ Co-Work agent รอบแรก"}
          </div>
          <div style={{ fontSize:12, color:"var(--muted)", fontFamily:"var(--font-thai)", marginTop:3 }}>
            {SYNCMETA.syncedAt
              ? `${SHARED.length} entries · synced by ${SYNCMETA.lastSyncedBy}`
              : `Drafts ของคุณ: ${localEntries.length} entries · sync ครั้งต่อไป: ${SYNCMETA.nextScheduled}`}
          </div>
        </div>
        {SYNCMETA.syncedAt && (
          <div style={{ textAlign:"right", fontSize:12, color:"var(--muted)", fontFamily:"var(--font-mono)" }}>
            <div>v{SYNCMETA.version}</div>
            <div style={{ marginTop:2 }}>next: {SYNCMETA.nextScheduled}</div>
          </div>
        )}
      </div>

      {/* ════════════════════════════════════════════
          SHARED FEED — baked in by Claude, everyone sees this
          ════════════════════════════════════════════ */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
        <h3 style={{ margin:0 }}>📡 Shared Updates</h3>
        <span style={{
          fontSize:12, padding:"3px 12px", borderRadius:999,
          background: SHARED.length > 0 ? "var(--green-soft)" : "var(--surface-2)",
          color: SHARED.length > 0 ? "var(--green)" : "var(--muted)",
          border:"1px solid", borderColor: SHARED.length > 0 ? "var(--green)" : "var(--border)",
          fontWeight:700
        }}>
          {SHARED.length > 0 ? `✅ ทุกคนเห็น · ${SHARED.length} entries` : "ยังไม่มีข้อมูล — รอ sync ครั้งแรก"}
        </span>
      </div>

      {SHARED.length > 0 && (
        <div className="filter-bar" style={{ marginBottom:14 }}>
          <button className={`filter-btn ${filterCat==="All"?"active":""}`} onClick={()=>setFilterCat("All")}>All ({SHARED.length})</button>
          {[...new Set(SHARED.map(e=>e.category))].map(c=>(
            <button key={c} className={`filter-btn ${filterCat===c?"active":""}`} onClick={()=>setFilterCat(c)}>
              {c} ({SHARED.filter(e=>e.category===c).length})
            </button>
          ))}
        </div>
      )}

      {SHARED.length === 0 ? (
        <div className="feed-empty" style={{ marginBottom:32 }}>
          <div style={{ fontSize:40, marginBottom:10 }}>📡</div>
          <div style={{ fontFamily:"var(--font-display)", fontWeight:700, fontSize:16, color:"var(--ink-2)" }}>
            รอ Claude Co-Work sync ครั้งแรก
          </div>
          <div style={{ fontFamily:"var(--font-thai)", fontSize:13, marginTop:6 }}>
            เมื่อ Co-Work agent รัน จะ embed ข้อมูลเข้า HTML และ deploy ขึ้น Vercel โดยอัตโนมัติ
          </div>
        </div>
      ) : (
        <div className="feed" style={{ marginBottom:32 }}>
          {filteredShared.map(e=>(
            <div key={e.id} className="feed-entry" style={{ borderLeft:"3px solid var(--green)" }}>
              <div className="entry-head">
                <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                  <span className={`pill ${catColor(e.category)}`} style={{ fontSize:11 }}>{e.category}</span>
                  <span style={{ fontSize:12, color:"var(--muted)" }}>{e.priority}</span>
                </div>
                {/* Sync batch badge — shows which sync added this entry */}
                {e.syncBatch && (
                  <span style={{
                    fontSize:11, color:"var(--green)", background:"var(--green-soft)",
                    padding:"2px 8px", borderRadius:6, border:"1px solid var(--green)",
                    fontFamily:"var(--font-mono)", whiteSpace:"nowrap"
                  }}>✅ sync {e.syncBatch}</span>
                )}
              </div>
              <div className="entry-title">{e.title}</div>
              {e.description && <div className="entry-body" style={{ marginTop:6, whiteSpace:"pre-wrap" }}>{e.description}</div>}
              <div className="entry-meta">
                <span className="meta-item">👤 {e.author}</span>
                {e.sectionRef && e.sectionRef !== "—  (General)" && (
                  <span className="meta-item" style={{
                    background:"var(--primary-soft)", color:"var(--primary)",
                    padding:"2px 8px", borderRadius:6, border:"1px solid var(--primary-soft)",
                    fontWeight:700
                  }}>📌 {e.sectionRef}</span>
                )}
                {e.linkedTC && <span className="meta-item">🔗 {e.linkedTC}</span>}
                <span className="meta-item">🕐 {fmtDate(e.ts)}</span>
                {e.syncedAt && (
                  <span className="meta-item" style={{ color:"var(--green)" }}>
                    📅 added on {fmtDate(e.syncedAt)}
                  </span>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ════════════════════════════════════════════
          MY DRAFTS — localStorage, this browser only, pending sync
          ════════════════════════════════════════════ */}
      <div style={{ borderTop:"1px dashed var(--border-strong)", paddingTop:24, marginTop:8 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
          <h3 style={{ margin:0 }}>📝 My Drafts</h3>
          <span style={{
            fontSize:12, padding:"3px 12px", borderRadius:999,
            background:"var(--amber-soft)", color:"var(--amber)",
            border:"1px solid var(--amber)", fontWeight:700
          }}>⏳ browser นี้เท่านั้น — รอ sync</span>
        </div>

        {/* Input Form */}
        <div className="update-form">
          <h3 style={{ marginTop:0, fontSize:17, color:"var(--ink-2)" }}>➕ เพิ่ม Draft ใหม่</h3>
          <div className="form-row cols-3">
            <div className="form-group">
              <label>Category <span className="th-label">ประเภท</span></label>
              <select className="form-select" value={form.category} onChange={e=>update("category",e.target.value)}>
                {CATEGORIES.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Priority <span className="th-label">ความสำคัญ</span></label>
              <select className="form-select" value={form.priority} onChange={e=>update("priority",e.target.value)}>
                {PRIORITIES.map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Your Name <span className="th-label">ชื่อผู้บันทึก *</span></label>
              <input className="form-input" placeholder="ชื่อของคุณ..." value={form.author} onChange={e=>update("author",e.target.value)}/>
            </div>
          </div>
          <div className="form-row cols-3">
            <div className="form-group">
              <label>Title <span className="th-label">หัวข้อ *</span></label>
              <input className="form-input" placeholder="สรุปสั้นๆ ว่าเกิดอะไรขึ้น..." value={form.title} onChange={e=>update("title",e.target.value)}/>
            </div>
            <div className="form-group">
              <label>Section Ref <span className="th-label">หัวข้อที่เกี่ยวข้อง</span></label>
              <select className="form-select" value={form.sectionRef} onChange={e=>update("sectionRef",e.target.value)}>
                {SECTION_REFS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Linked TC / File <span className="th-label">อ้างอิง (optional)</span></label>
              <input className="form-input" placeholder="TC-NPD-xxx หรือชื่อไฟล์..." value={form.linkedTC} onChange={e=>update("linkedTC",e.target.value)}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>Description <span className="th-label">รายละเอียด</span></label>
              <textarea className="form-textarea" placeholder="ปัญหาที่เจอ, คำตอบที่ได้, decision ที่ตัดสินใจ, หรือ note สำหรับทีม..." value={form.description} onChange={e=>update("description",e.target.value)}/>
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:16 }}>
            <button className="submit-btn" onClick={submit} disabled={!form.title.trim()||!form.author.trim()}>
              {saved ? "✅ บันทึกแล้ว!" : "💾 บันทึก Draft"}
            </button>
            {(!form.title.trim()||!form.author.trim()) &&
              <span style={{ fontSize:13, color:"var(--muted)", fontFamily:"var(--font-thai)" }}>กรอก Name + Title ก่อน</span>}
          </div>
        </div>

        {/* Local Drafts Feed */}
        {localEntries.length > 0 ? (
          <div className="feed" style={{ marginTop:14 }}>
            {localEntries.map(e=>(
              <div key={e.id} className="feed-entry" style={{ borderLeft:"3px solid var(--amber)" }}>

                  <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                    <span className={`pill ${catColor(e.category)}`} style={{ fontSize:11 }}>{e.category}</span>
                    <span style={{ fontSize:12, color:"var(--muted)" }}>{e.priority}</span>

                  </div>
                  <button className="entry-delete" onClick={()=>delLocal(e.id)} title="Delete draft">✕</button>

          </div>
        )}

        {/* Submit/Export Bar */}
        <div className="export-bar" style={{ marginTop:18, flexWrap:"wrap", gap:8 }}>

          </span>

          <button
            onClick={submitToHub}
            disabled={localEntries.length===0 || submitting}
            style={{
              padding:"8px 18px", borderRadius:"var(--radius)", border:"none", cursor:"pointer",
              background: submitStatus==="ok" ? "var(--green)" : submitStatus==="err" ? "#c0392b" : "var(--primary)",
              color:"#fff", fontWeight:700, fontSize:13,
              opacity: (localEntries.length===0 || submitting) ? 0.5 : 1,
              transition:"background .3s"
            }}
            title="ส่ง drafts ขึ้น Hub โดยตรง — ทุกคนเห็นใน sync รอบถัดไป (ภายใน 1 ชม.)">
            {submitting ? "⏳ กำลังส่ง…" : submitStatus==="ok" ? "✅ ส่งแล้ว!" : submitStatus==="err" ? "❌ ส่งไม่ได้ ลองใหม่" : "📤 ส่ง Update ให้ทีม"}
          </button>

          {/* SECONDARY: local export backup */}
          <button className="export-btn dl" onClick={exportJSON}
            disabled={localEntries.length===0} style={{ opacity:localEntries.length===0?0.45:1 }}
            title="สำรองไฟล์ JSON ไว้เครื่องตัวเอง (backup เท่านั้น)">
            ⬇ บันทึก JSON (backup)
          </button>
          <button className="export-btn imp" onClick={()=>fileRef.current?.click()}>⬆ Import JSON</button>
          <input ref={fileRef} type="file" accept=".json" style={{ display:"none" }} onChange={importJSON}/>
          <button className="export-btn clr" onClick={clearLocal}
            disabled={localEntries.length===0} style={{ opacity:localEntries.length===0?0.45:1 }}>
            🗑 Clear
          </button>
          {submitStatus==="err" && (
            <span style={{ fontSize:12, color:"#c0392b", fontFamily:"var(--font-thai)", marginLeft:4 }}>
              ส่งไม่ได้ — ตรวจ network หรือลอง backup JSON แทน
            </span>
          )}
        </div>
      </div>

      {/* ── Workflow Steps ── */}
      <div className="card soft" style={{ marginTop:24 }}>
        <h4 style={{ marginTop:0 }}>🔄 Workflow: ตั้งแต่ Draft → ทุกคนเห็น</h4>
        <div className="steps" style={{ margin:"10px 0" }}>
          <div className="step">
            <div className="step-num" style={{ fontSize:14 }}>1</div>
            <div className="step-body">
              <h4>กรอก Draft</h4>
              <p style={{ margin:0, fontSize:13 }}>กรอกฟอร์มด้านบน → "บันทึก Draft" — เก็บใน browser ของคุณก่อน คนอื่นยังไม่เห็น</p>
            </div>
          </div>
          <div className="step">
            <div className="step-num accent" style={{ fontSize:14 }}>2</div>
            <div className="step-body">
              <h4>กด "📤 ส่ง Update ให้ทีม"</h4>
              <p style={{ margin:0, fontSize:13 }}>คลิกปุ่มสีเขียว — ระบบส่ง drafts ขึ้น Hub โดยตรงทันที ไม่ต้องส่งไฟล์ให้ใคร</p>
            </div>
          </div>
          <div className="step">
            <div className="step-num" style={{ fontSize:14, background:"var(--green)" }}>3</div>
            <div className="step-body">
              <h4>Auto sync <span style={{ fontSize:12, color:"var(--green)", fontWeight:700 }}>ทุกชั่วโมง 10:00–20:00 น.</span></h4>
              <p style={{ margin:0, fontSize:13 }}>Co-Work รับ draft → merge เข้า Hub → <strong style={{ color:"var(--green)" }}>ทุกคนเห็นข้อมูลใหม่ภายใน 1 ชั่วโมง</strong></p>
            </div>
          </div>
        </div>
        <Callout kind="tip" icon="💡">
          <strong>ข้อมูลแต่ละ entry จะแสดง:</strong> Category · Priority · ชื่อผู้เพิ่ม · วันเวลาที่กรอก · วันที่ sync เข้า Hub — ไม่มีหาย ไม่มี duplicate
        </Callout>
      </div>

      <h3 style={{ marginTop:28 }}>FAQ</h3>
      <FAQItem q="คนอื่นเห็น Draft ที่ฉันกรอกเลยไหม?" qTh="Draft ใคร ใครเห็น">
        <p><strong>ยังไม่เห็น</strong> — Draft อยู่ใน browser คุณก่อน. กด <strong>"📤 ส่ง Update ให้ทีม"</strong> แล้ว Co-Work จะ pick up ใน sync รอบถัดไป (ภายใน 1 ชั่วโมง) → ทุกคนเห็น</p>
      </FAQItem>
      <FAQItem q="ถ้าหลายคนส่งพร้อมกัน จะ conflict ไหม?" qTh="Multi-user submit handling">
        <p>ไม่ conflict — แต่ละคนส่งเป็น file แยกกันใน Hub. Claude ใช้ <code className="inline">entry.id</code> (timestamp) เป็น dedup key ตอน merge ก่อน deploy.</p>
      </FAQItem>
      <FAQItem q="กดส่งแล้วจะเห็นเมื่อไหร่?" qTh="รอบ sync ถัดไป">
        <p>Co-Work sync <strong>ทุกชั่วโมง ช่วง 10:00–20:00 น.</strong> — ส่งตอนไหนก็เห็นใน sync รอบถัดไป ไม่เกิน 1 ชั่วโมง. สามารถ trigger ทันทีได้โดยบอก Claude ว่า <code className="inline">"sync updates manual"</code></p>
      </FAQItem>
      <FAQItem q="Note 'added on' กับ 'วันที่กรอก' ต่างกันยังไง?" qTh="ความแตกต่างของ timestamp">
        <p><code className="inline">🕐 วันที่กรอก</code> = เวลาที่กด "บันทึก Draft" ใน browser · <code className="inline">📅 added on</code> = เวลาที่ Co-Work embed เข้า Hub (เวลา sync). ต่างกันได้ไม่เกิน ~1 ชั่วโมง</p>
      </FAQItem>
    </Section>
  );
};

const wikiYaml = `name: Notion Change Notify

on:
  schedule:
    - cron: '0,30 1-12 * * 1-5'   # Mon–Fri 08:00–19:00 ICT (UTC+7) · ทุก 30 นาที
  workflow_dispatch:           # สั่งรันมือได้

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Notion for recent edits
        env:
          NOTION_TOKEN: \${{ secrets.NOTION_TOKEN }}
          DB_ID: \${{ secrets.NOTION_DATABASE_ID }}
          TEAMS_WEBHOOK: \${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          SINCE=$(date -u -d '31 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          RESP=$(curl -s -X POST \\
            "https://api.notion.com/v1/databases/\${DB_ID}/query" \\
            -H "Authorization: Bearer \${NOTION_TOKEN}" \\
            -H "Notion-Version: 2022-06-28" \\
            -H "Content-Type: application/json" \\
            -d "{\\"filter\\":{\\"property\\":\\"last_edited_time\\",
                 \\"date\\":{\\"after\\":\\"\${SINCE}\\"}}}")

          COUNT=$(echo "\$RESP" | python3 -c \\
            "import sys,json; d=json.load(sys.stdin); print(len(d.get('results',[])))")

          if [ "\$COUNT" -gt "0" ]; then
            NAMES=$(echo "\$RESP" | python3 -c \\
              "import sys,json; d=json.load(sys.stdin);
               [print('\\u2022', r['properties'].get('Name',{}).get('title',[{}])[0].get('plain_text','\\u2014'))
                for r in d['results']]" 2>/dev/null || echo "\\u2022 \$COUNT pages updated")

            MSG="\$COUNT หน้า Notion อัพเดทแล้ว:\\n\${NAMES}\\n\\nรัน Claude: ingest notion pages ที่เปลี่ยนแปลง"

            curl -s -X POST "\${TEAMS_WEBHOOK}" \\
              -H "Content-Type: application/json" \\
              -d "{\\"@type\\":\\"MessageCard\\",\\"themeColor\\":\\"5BA900\\",\\"title\\":\\"\\ud83d\\udd14 BigC IM Wiki\\",\\"text\\":\\"\${MSG}\\"}"
          fi`;

const WikiClaudeMd = () => {
  const claudeMdContent = `# BigC IM Wiki — S4 Supplier Portal

> Vault root: [OneDrive] › S4 - Supplier Portal › Documents › General › S4-Wiki
> Last updated: auto-updated by Claude on each ingest

## 1. Vault Purpose
This vault is the team knowledge base for BigC Supplier Portal Item Management (IM).
Claude should use this vault to answer questions, generate summaries, and maintain the wiki.

## 2. Directory Schema
\`\`\`
S4-Wiki/
├── CLAUDE.md          ← this file (DO NOT modify without team discussion)
├── README.md          ← team onboarding (Claude maintains)
├── raw/               ← source files dropped by humans (IMMUTABLE — never delete)
│   ├── workshops/
│   ├── as-is/
│   ├── meetings/
│   ├── assets/
│   └── _archive/      ← move here instead of deleting 🚨
└── wiki/              ← Claude's output (humans read only)
    ├── index.md       ← catalog of all wiki pages
    ├── log.md         ← append-only ingest timeline
    ├── entities/      ← people, systems, stakeholders
    ├── topics/        ← business topics (NPD, approval flow, etc.)
    └── summaries/     ← one summary per ingested source file
\`\`\`

## 3. Ingest Command
When asked to ingest new files, Claude should:
1. Read all new files in \`raw/\` that are not yet in \`wiki/log.md\`
2. Create a summary in \`wiki/summaries/[filename].md\`
3. Update \`wiki/index.md\` with the new entry
4. Append to \`wiki/log.md\`: date, file, key changes

## 4. Key Context
- Project: BigC Supplier Portal · Item Management (NPD Phase 1)
- Stack: Next.js 16, NestJS, Playwright E2E
- BRD scope: New Item (NPD) · Existing Supplier + Brand only
- Approval flow: Supplier → Buyer LV1 → (SRD?) → Buyer LV2 + parallel → SVP → GOLD

## 5. Rules
- raw/ = immutable. Never delete. Archive to raw/_archive/ instead.
- wiki/ = Claude writes, humans read only (no manual edits)
- When uncertain about scope, ask before acting
- Always append to wiki/log.md after any ingest
`;
  const [downloaded, setDownloaded] = React.useState(false);
  const handleDownload = () => {
    const blob = new Blob([claudeMdContent], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'CLAUDE.md'; a.click();
    URL.revokeObjectURL(url);
    setDownloaded(true);
    setTimeout(() => setDownloaded(false), 2000);
  };
  return (
    <Section id="wiki-claude-md" eyebrow="W5 · CLAUDE.md" eyebrowKind=""
      title="CLAUDE.md — Template"
      subtitle={<>วางไฟล์นี้ที่ root ของ S4-Wiki ก่อนรัน claude · Claude อ่านไฟล์นี้ทุกครั้งที่เปิด</>}
      thai={<>CLAUDE.md = soul of vault · กำหนด schema, rules, และ context สำหรับ Claude</>}
    >
      <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:18,padding:"14px 18px",background:"var(--primary-soft)",borderRadius:"var(--radius)",border:"1px solid var(--primary)"}}>
        <div style={{flex:1}}>
          <div style={{fontFamily:"var(--font-display)",fontWeight:700,fontSize:15,color:"var(--primary)",marginBottom:4}}>📥 ดาวน์โหลด CLAUDE.md</div>
          <div style={{fontSize:13,color:"var(--ink-2)"}}>วางที่ <code className="inline">S4-Wiki/CLAUDE.md</code> · แก้ไข sections 4–5 ตามโปรเจกต์จริง</div>
        </div>
        <button onClick={handleDownload} style={{padding:"10px 20px",background:downloaded?"var(--green)":"var(--primary)",color:"#fff",border:"none",borderRadius:"var(--radius-sm)",fontFamily:"var(--font-body)",fontSize:14,fontWeight:700,cursor:"pointer",transition:"background .2s",flexShrink:0}}>
          {downloaded?"✓ Downloaded":"⬇ Download"}
        </button>
      </div>
      <CodeBlock label="CLAUDE.md">{claudeMdContent}</CodeBlock>
      <Callout kind="tip" icon="★">
        <div><strong>แก้ Section 4 ก่อน:</strong> อัพเดท Key Context ให้ตรงกับโปรเจกต์จริง — project name, stack, BRD scope, approval flow summary</div>
      </Callout>
    </Section>
  );
};
