<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BigC IM Wiki · Sync Flow Guide · READY MS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   BigC IM · Wiki Sync Flow Guide
   Colors  : bigc-im-hub.vercel.app
   Structure: bigc-kt-training.vercel.app
   ============================================================ */
:root {
  --bg:#F8FBFF;--bg-2:#EEF5E8;--surface:#FFFFFF;--surface-2:#F9FDF5;
  --ink:#18201A;--ink-2:#3D4840;--muted:#7A8A7D;
  --border:#DDE8D8;--border-strong:#C4D9BC;
  --primary:#5BA900;--primary-2:#93D600;--primary-soft:#EBF7D4;
  --accent:#DB000E;--accent-soft:#FFEAEB;
  --green:#3C8C1E;--green-soft:#D5F0C0;
  --red:#C7493A;--red-soft:#F8E0DA;
  --amber:#D78A1E;--amber-soft:#FBEDD2;
  --shadow-sm:0 1px 3px rgba(24,32,26,.07),0 1px 2px rgba(24,32,26,.04);
  --shadow-md:0 8px 24px -8px rgba(24,32,26,.13),0 2px 6px rgba(24,32,26,.06);
  --shadow-lg:0 24px 60px -20px rgba(24,32,26,.16),0 4px 12px rgba(24,32,26,.07);
  --radius-sm:8px;--radius:14px;--radius-lg:22px;--radius-xl:32px;
  --sidebar-w:280px;
  --font-display:"Bricolage Grotesque","IBM Plex Sans Thai",system-ui,sans-serif;
  --font-body:"Plus Jakarta Sans","IBM Plex Sans Thai",system-ui,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  --font-thai:"IBM Plex Sans Thai","Plus Jakarta Sans",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{min-height:100vh}
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
/* SIDEBAR */
.sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--bg-2);border-right:1px solid var(--border);border-top:3px solid var(--primary-2);padding:28px 22px;display:flex;flex-direction:column;gap:18px}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding-bottom:8px}
.sidebar-brand .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--green) 0%,var(--primary-2) 100%);display:grid;place-items:center;color:#fff;font-family:var(--font-display);font-weight:800;font-size:17px;box-shadow:var(--shadow-sm)}
.sidebar-brand .title{font-family:var(--font-display);font-weight:700;font-size:15px;line-height:1.1}
.sidebar-brand .sub{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.nav-section{margin-top:8px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:0 8px 6px;font-weight:600}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:14px;color:var(--ink-2);cursor:pointer;text-decoration:none;font-weight:500;transition:background .15s ease,color .15s ease;border:none;background:transparent;text-align:left;width:100%;font-family:inherit}
.nav-link:hover{background:rgba(24,32,26,.05);color:var(--ink)}
.nav-link.active{background:var(--surface);color:var(--primary);box-shadow:var(--shadow-sm)}
.nav-link .num{width:22px;height:22px;border-radius:6px;background:rgba(24,32,26,.06);display:grid;place-items:center;font-size:11px;font-weight:700;font-family:var(--font-mono);color:var(--ink-2);flex-shrink:0}
.nav-link.active .num{background:var(--primary);color:#fff}
.sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);line-height:1.4}
/* MAIN */
.main{padding:56px 64px 120px;max-width:1080px;width:100%;margin-left:auto;margin-right:auto}
section{padding:36px 0 24px;scroll-margin-top:24px}
section+section{border-top:1px dashed var(--border-strong)}
/* TYPOGRAPHY */
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--primary);background:var(--primary-soft);padding:6px 12px;border-radius:999px;margin-bottom:16px}
.eyebrow.accent{color:var(--accent);background:var(--accent-soft)}
.eyebrow.green{color:var(--green);background:var(--green-soft)}
h1{font-family:var(--font-display);font-weight:700;font-size:clamp(36px,4vw,52px);line-height:1.05;letter-spacing:-.02em;margin:0 0 12px;color:var(--ink)}
h1 .accent-word{font-style:italic;color:var(--accent);font-weight:600}
h2{font-family:var(--font-display);font-weight:700;font-size:clamp(26px,3vw,36px);line-height:1.1;letter-spacing:-.015em;margin:0 0 8px;color:var(--ink)}
h3{font-family:var(--font-display);font-weight:600;font-size:21px;line-height:1.25;margin:24px 0 8px;color:var(--ink)}
h4{font-family:var(--font-body);font-weight:600;font-size:16px;margin:16px 0 6px;color:var(--ink)}
p{margin:0 0 14px;color:var(--ink-2)}
p strong{color:var(--ink);font-weight:600}
a{color:var(--primary);text-decoration:none;border-bottom:1px solid var(--primary-soft)}
a:hover{border-bottom-color:var(--primary)}
.lead{font-size:19px;line-height:1.55;color:var(--ink-2);max-width:70ch}
.thai{font-family:var(--font-thai);color:var(--muted);font-size:.92em;line-height:1.65;font-weight:400}
.thai-lead{font-family:var(--font-thai);color:var(--ink-2);font-size:16px;line-height:1.7;padding:12px 16px;background:var(--surface-2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;margin:14px 0 22px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-sm)}
.card.soft{background:var(--surface-2)}
.grid{display:grid;gap:18px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}
/* CALLOUT */
.callout{display:flex;gap:14px;padding:18px 20px;border-radius:var(--radius);background:var(--primary-soft);border-left:4px solid var(--primary);margin:18px 0}
.callout.warn{background:var(--amber-soft);border-left-color:var(--amber)}
.callout.tip{background:var(--green-soft);border-left-color:var(--green)}
.callout.danger{background:var(--red-soft);border-left-color:var(--red)}
.callout-icon{font-family:var(--font-display);font-size:22px;flex-shrink:0}
.callout-body{font-size:14px;line-height:1.55;color:var(--ink-2)}
.callout-body strong{color:var(--ink)}
/* CODE */
.code-wrap{position:relative;margin:14px 0;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:#1A1E16;max-width:100%;min-width:0}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:#131710;border-bottom:1px solid #252D1A;font-family:var(--font-mono);font-size:11px;color:#9AB087;letter-spacing:.05em}
.code-header .label{display:flex;align-items:center;gap:8px;text-transform:uppercase;font-weight:600}
.code-header .label .dot{width:8px;height:8px;border-radius:50%;background:var(--primary-2)}
.code-copy{font-family:var(--font-body);font-size:11px;font-weight:600;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#E8F5D4;padding:4px 10px;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:background .15s ease}
.code-copy:hover{background:rgba(255,255,255,.16)}
.code-copy.copied{background:var(--primary);border-color:var(--primary);color:#fff}
pre.code{margin:0;padding:16px 18px;font-family:var(--font-mono);font-size:13px;line-height:1.65;color:#E8F5D4;overflow-x:auto;white-space:pre;tab-size:2}
code.inline{font-family:var(--font-mono);font-size:.88em;background:var(--bg-2);border:1px solid var(--border);padding:1px 7px;border-radius:6px;color:var(--ink)}
/* STEPS */
.steps{display:flex;flex-direction:column;gap:18px;margin:18px 0}
.step{display:grid;grid-template-columns:44px 1fr;gap:16px;align-items:flex-start}
.step-num{width:44px;height:44px;border-radius:12px;background:var(--primary);color:#fff;display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:18px}
.step-num.accent{background:var(--accent)}
.step-num.amber{background:var(--amber)}
.step-body{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;min-width:0}
.step-body h4{margin-top:0}
/* FAQ */
.faq-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.faq-q{width:100%;text-align:left;background:transparent;border:none;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:14px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink)}
.faq-q .chev{width:22px;height:22px;border-radius:50%;background:var(--bg-2);display:grid;place-items:center;font-size:11px;flex-shrink:0;transition:transform .2s ease;color:var(--ink-2)}
.faq-item.open .chev{transform:rotate(180deg);background:var(--primary);color:#fff}
.faq-a{padding:0 20px 16px;font-size:14px;color:var(--ink-2);line-height:1.6}
/* HERO */
.hero{padding-top:24px;padding-bottom:30px}
.hero-meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:26px;padding:18px 22px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}
.hero-meta-item .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin-bottom:4px}
.hero-meta-item .value{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ink)}
.hero-meta-divider{width:1px;background:var(--border);align-self:stretch}
/* FEATURE STRIP */
.feature-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:22px 0}
@media(max-width:800px){.feature-strip{grid-template-columns:1fr}}
.feature{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;position:relative;overflow:hidden}
.feature .icon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;margin-bottom:14px;font-size:22px}
.feature .icon.go{background:var(--primary-soft)}
.feature .icon.red{background:var(--accent-soft)}
.feature .icon.grn{background:var(--green-soft)}
.feature h3{margin:0 0 8px;font-size:18px}
.feature p{margin:0;font-size:14px;color:var(--ink-2)}
.feature .th{font-family:var(--font-thai);font-size:13px;color:var(--muted);margin-top:6px}
/* COMPARE */
.compare{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin:24px 0}
@media(max-width:800px){.compare{grid-template-columns:1fr}}
.compare-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;position:relative;overflow:hidden}
.compare-card::before{content:'';position:absolute;inset:0 0 auto 0;height:4px}
.compare-card.phase0::before{background:var(--muted)}
.compare-card.phase05::before{background:var(--primary)}
.compare-card.phase1::before{background:var(--amber)}
.compare-card .phase-tag{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:5px;display:inline-block;margin-bottom:10px}
.phase-tag.p0{background:var(--bg-2);color:var(--muted)}
.phase-tag.p05{background:var(--primary-soft);color:var(--green)}
.phase-tag.p1{background:var(--amber-soft);color:var(--amber)}
.compare-card h3{margin:0 0 8px;font-size:17px}
.compare-card .tagline{font-size:13px;color:var(--muted);margin-bottom:14px;font-family:var(--font-thai)}
.pros-cons{margin-top:10px}
.pros-cons ul{padding:0;margin:0}
.pros-cons li{display:flex;gap:10px;align-items:flex-start;padding:7px 0;list-style:none;font-size:13.5px;line-height:1.45}
.pros-cons .mark{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;font-family:var(--font-mono);margin-top:2px}
.pros-cons .pro .mark{background:var(--green-soft);color:var(--green)}
.pros-cons .con .mark{background:var(--red-soft);color:var(--red)}
/* INFOGRAPHIC wrapper */
.ig-wrap{background:linear-gradient(180deg,#FFFFFF 0%,var(--surface-2) 100%);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px 32px 24px;margin:20px 0;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.ig-title{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ink)}
.ig-sub{font-family:var(--font-thai);font-size:12px;color:var(--muted);margin-top:3px}
.ig-stage{position:relative;margin-top:16px}
.ig-caption{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:14px;text-align:center}
.ig-caption .th{font-family:var(--font-thai);margin-top:2px;color:rgba(122,138,125,.75)}
/* PILL badges */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;font-family:var(--font-mono)}
.pill.green{background:var(--green-soft);color:var(--green)}
.pill.red{background:var(--accent-soft);color:var(--accent)}
.pill.amber{background:var(--amber-soft);color:var(--amber)}
.pill.blue{background:var(--primary-soft);color:var(--primary)}
.pill.gray{background:var(--bg-2);color:var(--muted)}
/* KBD */
kbd{font-family:var(--font-mono);font-size:11px;background:var(--surface);border:1px solid var(--border-strong);border-bottom-width:2px;padding:2px 7px;border-radius:5px;color:var(--ink)}
/* ANIMATION helpers */
@keyframes clickRipple{0%{opacity:.85;transform:scale(.1)}100%{opacity:0;transform:scale(2.8)}}
@keyframes fadeInAnim{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
/* PRINT */
@media print{.sidebar,button{display:none!important}.app{grid-template-columns:1fr}.main{padding:20px;max-width:none}body{background:#fff;font-size:11pt}section{page-break-inside:avoid;padding:16px 0}}
/* RESPONSIVE */
@media(max-width:1000px){.app{grid-template-columns:1fr}.sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;max-height:75vh;z-index:50;border-top:1px solid var(--border);border-right:none;transform:translateY(calc(100% - 68px));transition:transform .25s ease;overflow-y:auto;box-shadow:0 -10px 28px rgba(24,32,26,.10)}.sidebar.open{transform:translateY(0)}.sidebar-brand{cursor:pointer;position:sticky;top:0;background:var(--surface);z-index:2;border-bottom:1px solid var(--border);padding-right:44px}.sidebar-brand .drawer-handle{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px;transition:transform .25s ease;line-height:1}.sidebar.open .sidebar-brand .drawer-handle{transform:translateY(-50%) rotate(180deg)}.main{padding:28px 22px 96px}}
@media(min-width:1001px){.sidebar-brand .drawer-handle{display:none}}
@media(max-width:700px){html,body{max-width:100vw;overflow-x:hidden}body{font-size:15px}.main{padding:22px 16px 96px}.ig-wrap{display:none!important}h1{font-size:clamp(28px,8vw,38px)!important}h2{font-size:clamp(22px,6vw,30px)!important}.lead{font-size:16px!important}.compare{grid-template-columns:1fr!important}.feature-strip{grid-template-columns:1fr!important}}
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<!-- ── Components (pattern from bigc-kt-training) ── -->
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function Section({ id, eyebrow, eyebrowKind="", title, subtitle, thai, children }) {
  return (
    <section id={id}>
      {eyebrow && <span className={`eyebrow ${eyebrowKind}`}>{eyebrow}</span>}
      <h2>{title}</h2>
      {subtitle && <p className="lead" style={{marginTop:4}}>{subtitle}</p>}
      {thai && <div className="thai-lead">{thai}</div>}
      {children}
    </section>
  );
}

function Callout({ kind="info", icon, children }) {
  const ic = icon||(kind==="warn"?"⚠":kind==="tip"?"★":kind==="danger"?"✕":"i");
  return (
    <div className={`callout ${kind==="info"?"":kind}`}>
      <div className="callout-icon">{ic}</div>
      <div className="callout-body">{children}</div>
    </div>
  );
}

function CodeBlock({ label="shell", children }) {
  const [copied, setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(typeof children==="string"?children:""); setCopied(true); setTimeout(()=>setCopied(false),1400); };
  return (
    <div className="code-wrap">
      <div className="code-header">
        <span className="label"><span className="dot"></span>{label}</span>
        <button className={`code-copy ${copied?"copied":""}`} onClick={copy}>{copied?"Copied ✓":"Copy"}</button>
      </div>
      <pre className="code">{children}</pre>
    </div>
  );
}

function FAQItem({ q, qTh, children }) {
  const [open, setOpen] = useState(false);
  return (
    <div className={`faq-item ${open?"open":""}`}>
      <button className="faq-q" onClick={()=>setOpen(!open)} aria-expanded={open}>
        <span>{q}{qTh&&<div style={{fontFamily:"var(--font-thai)",fontSize:13,color:"var(--muted)",fontWeight:400,marginTop:2}}>{qTh}</div>}</span>
        <span className="chev">▾</span>
      </button>
      {open&&<div className="faq-a">{children}</div>}
    </div>
  );
}

function Infographic({ title, thai, caption, captionTh, children, height=240 }) {
  return (
    <div className="ig-wrap">
      <div className="ig-title">{title}</div>
      {thai&&<div className="ig-sub">{thai}</div>}
      <div className="ig-stage" style={{height}}>{children}</div>
      {caption&&(
        <div className="ig-caption">
          {caption}
          {captionTh&&<div className="th">{captionTh}</div>}
        </div>
      )}
    </div>
  );
}

const NAV = [];

const Sidebar = ({ active, onJump, open, onToggle }) => {
  const groups = NAV.reduce((acc,item)=>{(acc[item.group]=acc[item.group]||[]).push(item);return acc;},{});
  return (
    <aside className={`sidebar ${open?"open":""}`}>
      <div className="sidebar-brand" onClick={()=>onToggle&&onToggle(!open)} role="button" aria-label="menu">
        <div className="logo">📋</div>
        <div>
          <div className="title">BigC IM · Wiki Sync</div>
          <div className="sub">Way of Work · READY MS</div>
        </div>
        <span className="drawer-handle" aria-hidden="true">▴</span>
      </div>
      {Object.entries(groups).map(([group,items])=>(
        <div key={group}>
          <div className="nav-section">{group}</div>
          {items.map(item=>(
            <button key={item.id} className={`nav-link ${active===item.id?"active":""}`}
              onClick={()=>{onJump(item.id);onToggle&&onToggle(false);}}>
              <span className="num">{item.num}</span>
              <span style={{display:"flex",flexDirection:"column",gap:0,alignItems:"flex-start"}}>
                <span>{item.label}</span>
                <span style={{fontFamily:"var(--font-thai)",fontSize:11,color:"var(--muted)",fontWeight:400,lineHeight:1.2}}>{item.labelTh}</span>
              </span>
            </button>
          ))}
        </div>
      ))}
      <div className="sidebar-footer">
        <div style={{fontWeight:600,color:"var(--ink-2)",marginBottom:4}}>📄 Print this page</div>
        <div>Press <kbd>Ctrl</kbd> <kbd>P</kbd> — PDF cheat-sheet</div>
        <div className="thai" style={{fontSize:11,marginTop:4}}>กดเพื่อพิมพ์เป็น PDF</div>
      </div>
    </aside>
  );
};

const App = ({ children }) => {
  const [active, setActive] = useState(NAV[0]?.id||"");
  const [open, setOpen] = useState(false);
  const jump = (id) => {
    const el = document.getElementById(id);
    if(el){ const y=el.getBoundingClientRect().top+window.scrollY-16; window.scrollTo({top:y,behavior:"smooth"}); }
    setActive(id);
  };
  useEffect(()=>{
    if(!NAV.length) return;
    const compute=()=>{
      const y=window.scrollY,vh=window.innerHeight,docMax=document.documentElement.scrollHeight-vh;
      if(y<80){setActive(NAV[0].id);return;}
      if(docMax-y<80){setActive(NAV[NAV.length-1].id);return;}
      const line=vh*0.3;let best=NAV[0].id;
      for(const n of NAV){const el=document.getElementById(n.id);if(!el)continue;const top=el.getBoundingClientRect().top;if(top<=line)best=n.id;}
      setActive(best);
    };
    let raf=0;
    const onScroll=()=>{if(raf)return;raf=requestAnimationFrame(()=>{raf=0;compute();});};
    window.addEventListener("scroll",onScroll,{passive:true});
    window.addEventListener("resize",onScroll);
    compute();
    return()=>{window.removeEventListener("scroll",onScroll);window.removeEventListener("resize",onScroll);if(raf)cancelAnimationFrame(raf);};
  },[]);
  return (

/* ── 02 GitHub Actions Config ── */
const yaml = `name: Notion Change Notify

on:
  schedule:
    - cron: '0,30 1-12 * * 1-5'   # Mon–Fri 08:00–19:00 ICT (UTC+7) · ทุก 30 นาที
  workflow_dispatch:           # สั่งรันมือได้

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Notion for recent edits
        env:
          NOTION_TOKEN: \${{ secrets.NOTION_TOKEN }}
          DB_ID: \${{ secrets.NOTION_DATABASE_ID }}
          TEAMS_WEBHOOK: \${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          # หาหน้าที่แก้ใน 31 นาทีที่ผ่านมา
          SINCE=$(date -u -d '31 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          RESP=$(curl -s -X POST \\
            "https://api.notion.com/v1/databases/\${DB_ID}/query" \\
            -H "Authorization: Bearer \${NOTION_TOKEN}" \\
            -H "Notion-Version: 2022-06-28" \\
            -H "Content-Type: application/json" \\
            -d "{\\"filter\\":{\\"property\\":\\"last_edited_time\\",
                 \\"date\\":{\\"after\\":\\"\${SINCE}\\"}}}")

          COUNT=$(echo "\$RESP" | python3 -c \\
            "import sys,json; d=json.load(sys.stdin); print(len(d.get('results',[])))")

          if [ "\$COUNT" -gt "0" ]; then
            NAMES=$(echo "\$RESP" | python3 -c \\
              "import sys,json; d=json.load(sys.stdin);
               [print('\\u2022', r['properties'].get('Name',{}).get('title',[{}])[0].get('plain_text','\\u2014'))
                for r in d['results']]" 2>/dev/null || echo "\\u2022 \$COUNT pages updated")

            MSG="\$COUNT หน้า Notion อัพเดทแล้ว:\\n\${NAMES}\\n\\nรัน Claude: ingest notion pages ที่เปลี่ยนแปลง"

            curl -s -X POST "\${TEAMS_WEBHOOK}" \\
              -H "Content-Type: application/json" \\
              -d "{\\"@type\\":\\"MessageCard\\",\\"themeColor\\":\\"5BA900\\",\\"title\\":\\"\\ud83d\\udd14 BigC IM Wiki\\",\\"text\\":\\"\${MSG}\\"}"
          fi`;

You are the maintainer of a project knowledge wiki for the **S4 Supplier Portal IM (NPD)**,
run by READY MS (consulting). Your job is to keep the wiki current, consistent, and
well-organized as new sources arrive.

## Architecture

- \`raw/\` — original sources. IMMUTABLE. Read only. Never modify.
  - \`raw/workshops/\` — workshop notes (filename: YYYY-MM-DD-ws<NN>-<topic>.md)
  - \`raw/as-is/\` — as-is process documentation (PDFs, docs)
  - \`raw/meetings/\` — meeting minutes (filename: YYYY-MM-DD-<who>.md)
  - \`raw/assets/\` — images, screenshots
  - \`raw/_archive/\` — files moved here instead of deleted. Never delete from vault.
- \`wiki/\` — your output. You own these files. Humans read them.
  - \`wiki/index.md\` — catalog of every page, one line each
  - \`wiki/log.md\` — append-only timeline (## [YYYY-MM-DD] <op> | <title>)
  - \`wiki/entities/\` — one page per person, team, system, module
  - \`wiki/topics/\` — one page per business topic (NPD, approval flow, invoice, etc.)
  - \`wiki/summaries/\` — one summary page per ingested source

## Operations

### INGEST (when user says "ingest <source>" or drops a file)
1. If source file is outside raw/, copy it from its given path into the appropriate
   raw/ subfolder first. Never skip this step.
2. Read the source completely.
3. Discuss 3-5 key takeaways with the user. Wait for confirmation.
4. Write \`wiki/summaries/<source-slug>.md\` — a 200-400 word summary,
   YAML frontmatter (date, source, tags), wikilinks to entities/topics.
5. Update relevant \`wiki/entities/<entity>.md\` pages (create if new).
6. Update relevant \`wiki/topics/<topic>.md\` pages (create if new).
7. If new info contradicts an existing page, ADD a "Δ Contradiction" section
   on the topic page citing both sources. Do not silently overwrite.
8. Append entry to \`wiki/log.md\` (## [YYYY-MM-DD] ingest | <title>).
9. Update \`wiki/index.md\` with the new pages.

### QUERY (when user asks a question)
1. Read \`wiki/index.md\` first to find relevant pages.
2. Read those pages. Synthesize an answer.
3. Always include \`[[wikilinks]]\` to the pages you used as citations.
4. If the answer is novel and likely to be re-asked, offer to file it as
   a new page in \`wiki/topics/\` or \`wiki/analyses/\`.

### LINT (when user says "lint" or "health-check")
Check the wiki for: orphan pages (no inbound links), stale claims,
unflagged contradictions, missing cross-references, important concepts
mentioned but lacking their own page. Report findings; do not auto-fix.

## Conventions

- All dates: YYYY-MM-DD.
- Filenames: kebab-case, lowercase.
- Wikilinks always: \`[[entity-name]]\` or \`[[topics/npd-approval]]\`.
- YAML frontmatter on every wiki page:
  \`\`\`yaml
  ---
  type: entity | topic | summary | analysis
  tags: [s4, <relevant>]
  updated: YYYY-MM-DD
  sources: [list of raw/ paths]
  ---
  \`\`\`
- Language: write in **English**. Quote Thai/local terms verbatim when
  they appear in sources, in parentheses.
- Tone: factual, concise. Use bullet points over prose where possible.

## File ownership (DO NOT VIOLATE)

- \`raw/**\` — human-owned, immutable. Never edit.
- \`wiki/**\` — LLM-owned. Humans read only.
- \`CLAUDE.md\` — co-owned. Discuss changes before editing.

## When unsure

Ask the user. Don't guess about the S4 domain. Don't fabricate stakeholders.
If a source is ambiguous, surface the ambiguity in the summary.`;
      const handleDownload = () => {
        const blob = new Blob([claudeMdContent], {type:"text/markdown;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "CLAUDE.md"; a.click();
        URL.revokeObjectURL(url);
      };
      return (

        </div>
      );
